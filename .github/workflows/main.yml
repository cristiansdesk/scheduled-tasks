name: Run Birthday Wisher Daily

on:
  schedule:
    # Runs at 12:00 UTC (8:00 AM EST) every single day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to also run it manually anytime with a button click

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Execute Python Script
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        run: python main.py
